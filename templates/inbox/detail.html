{% extends "base.html" %}

{% block title %}Inbox Details - {{ settings.app_name }}{% endblock %}

{% block content %}
<div class="min-h-screen py-12 px-4" x-data="inboxDetail()">
    <!-- Back Button -->
    <div class="max-w-7xl mx-auto mb-8">
        <a href="/inbox/list" class="inline-flex items-center text-purple-400 hover:text-purple-300 transition-colors">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Back to Inboxes
        </a>
    </div>

    <!-- Loading State -->
    <template x-if="loading">
        <div class="flex items-center justify-center py-20">
            <svg class="animate-spin h-12 w-12 text-purple-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </div>
    </template>

    <!-- Error State -->
    <template x-if="error">
        <div class="max-w-4xl mx-auto">
            <div class="bg-red-500/10 border border-red-500/20 text-red-400 px-6 py-4 rounded-lg">
                <p x-text="error"></p>
            </div>
        </div>
    </template>

    <!-- Inbox Details -->
    <template x-if="!loading && !error && inbox">
        <div class="max-w-7xl mx-auto">
            <!-- Header -->
            <div class="glass rounded-2xl p-8 mb-6">
                <div class="flex items-start justify-between">
                    <div class="flex items-center space-x-4">
                        <div class="h-16 w-16 bg-gradient-to-br from-red-500 to-yellow-500 rounded-2xl flex items-center justify-center">
                            <svg class="h-10 w-10 text-white" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 0 1 0 19.366V5.457c0-2.023 2.309-3.178 3.927-1.964L5.455 4.64 12 9.548l6.545-4.91 1.528-1.145C21.69 2.28 24 3.434 24 5.457z"/>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-3xl font-bold text-white" x-text="inbox.email_address"></h1>
                            <p class="text-gray-300 mt-1" x-text="inbox.provider + ' • ' + inbox.domain"></p>
                        </div>
                    </div>
                    
                    <!-- Status Badge -->
                    <span 
                        :class="{
                            'bg-green-500/20 text-green-400': inbox.status === 'active',
                            'bg-yellow-500/20 text-yellow-400': inbox.status === 'paused',
                            'bg-red-500/20 text-red-400': inbox.status === 'error',
                            'bg-gray-500/20 text-gray-400': inbox.status === 'disconnected'
                        }"
                        class="px-4 py-2 rounded-full text-sm font-semibold"
                        x-text="inbox.status.toUpperCase()"
                    ></span>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                <div class="glass rounded-xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <div class="h-12 w-12 bg-gradient-to-br from-blue-500 to-purple-500 rounded-xl flex items-center justify-center">
                            <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                            </svg>
                        </div>
                    </div>
                    <p class="text-3xl font-bold text-white" x-text="inbox.total_sent || 0"></p>
                    <p class="text-sm text-gray-400">Emails Sent</p>
                </div>

                <div class="glass rounded-xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <div class="h-12 w-12 bg-gradient-to-br from-green-500 to-teal-500 rounded-xl flex items-center justify-center">
                            <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 19v-8.93a2 2 0 01.89-1.664l7-4.666a2 2 0 012.22 0l7 4.666A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-1.14.76a2 2 0 01-2.22 0l-1.14-.76"></path>
                            </svg>
                        </div>
                    </div>
                    <p class="text-3xl font-bold text-white" x-text="inbox.total_received || 0"></p>
                    <p class="text-sm text-gray-400">Emails Received</p>
                </div>

                <div class="glass rounded-xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <div class="h-12 w-12 bg-gradient-to-br from-orange-500 to-red-500 rounded-xl flex items-center justify-center">
                            <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                            </svg>
                        </div>
                    </div>
                    <p class="text-3xl font-bold text-white" x-text="inbox.daily_send_limit || 0"></p>
                    <p class="text-sm text-gray-400">Daily Send Limit</p>
                </div>

                <div class="glass rounded-xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <div class="h-12 w-12 bg-gradient-to-br from-pink-500 to-purple-500 rounded-xl flex items-center justify-center">
                            <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                            </svg>
                        </div>
                    </div>
                    <p class="text-3xl font-bold text-white" x-text="`Stage ${inbox.warmup_stage || 1}`"></p>
                    <p class="text-sm text-gray-400">Warmup Stage</p>
                </div>
            </div>

            <!-- Warmup Progress -->
            <div class="glass rounded-xl p-6 mb-6">
                <h2 class="text-xl font-bold text-white mb-4">Warmup Progress</h2>
                <div class="mb-4">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-gray-300">Stage Progress</span>
                        <span class="text-sm font-semibold text-white" x-text="`Stage ${inbox.warmup_stage || 1} of 10`"></span>
                    </div>
                    <div class="w-full bg-gray-700 rounded-full h-3">
                        <div 
                            class="bg-gradient-to-r from-purple-500 to-blue-500 h-3 rounded-full transition-all"
                            :style="`width: ${((inbox.warmup_stage || 1) / 10) * 100}%`"
                        ></div>
                    </div>
                </div>
                <p class="text-sm text-gray-400">Your inbox is progressing through our warmup stages to build sender reputation.</p>
            </div>

            <!-- Last Activity -->
            <div class="glass rounded-xl p-6 mb-6" x-show="inbox.last_activity">
                <h2 class="text-xl font-bold text-white mb-4">Activity Information</h2>
                <div class="space-y-3">
                    <div class="flex items-center justify-between py-2 border-b border-gray-600">
                        <span class="text-gray-300">Last Activity</span>
                        <span class="text-white font-medium" x-text="formatDate(inbox.last_activity)"></span>
                    </div>
                    <div class="flex items-center justify-between py-2 border-b border-gray-600">
                        <span class="text-gray-300">Created At</span>
                        <span class="text-white font-medium" x-text="formatDate(inbox.created_at)"></span>
                    </div>
                    <div class="flex items-center justify-between py-2">
                        <span class="text-gray-300">Token Expiry</span>
                        <span class="text-white font-medium" x-text="formatDate(inbox.token_expiry)"></span>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="glass rounded-xl p-6">
                <h2 class="text-xl font-bold text-white mb-4">Actions</h2>
                <div class="flex flex-wrap gap-4">
                    <template x-if="inbox.status === 'active'">
                        <button 
                            @click="pauseInbox"
                            class="px-6 py-3 bg-yellow-600 text-white rounded-lg font-semibold hover:bg-yellow-700 transition-all flex items-center space-x-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <span>Pause Inbox</span>
                        </button>
                    </template>
                    
                    <template x-if="inbox.status === 'paused'">
                        <button 
                            @click="activateInbox"
                            class="px-6 py-3 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700 transition-all flex items-center space-x-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <span>Activate Inbox</span>
                        </button>
                    </template>

                    <button 
                        @click="confirmDelete"
                        class="px-6 py-3 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700 transition-all flex items-center space-x-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                        </svg>
                        <span>Delete Inbox</span>
                    </button>
                </div>
            </div>
        </div>
    </template>
</div>

<!-- Delete Confirmation Modal -->
<div x-show="deleteModal.show" 
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 overflow-y-auto" 
     style="display: none;">
    <div class="flex items-center justify-center min-h-screen px-4">
        <div class="fixed inset-0 bg-black/60 backdrop-blur-sm" @click="deleteModal.show = false"></div>
        
        <div class="relative glass-dark rounded-2xl p-8 max-w-md w-full shadow-2xl">
            <h3 class="text-2xl font-bold text-white mb-4">Delete Inbox?</h3>
            <p class="text-gray-300 mb-6">Are you sure you want to delete this inbox? This action cannot be undone and will remove all associated data.</p>
            
            <div class="flex space-x-4">
                <button 
                    @click="deleteModal.show = false"
                    class="flex-1 px-6 py-3 bg-white/10 text-white rounded-xl font-semibold hover:bg-white/20 transition-all">
                    Cancel
                </button>
                <button 
                    @click="deleteInbox"
                    class="flex-1 px-6 py-3 bg-red-600 text-white rounded-xl font-semibold hover:bg-red-700 transition-all">
                    Delete
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function inboxDetail() {
    return {
        inbox: null,
        loading: true,
        error: '',
        deleteModal: {
            show: false
        },

        async init() {
            const pathParts = window.location.pathname.split('/');
            const inboxId = pathParts[pathParts.length - 1];
            
            if (!inboxId || inboxId === 'list') {
                this.error = 'Invalid inbox ID';
                this.loading = false;
                return;
            }

            await this.loadInbox(inboxId);
        },

        async loadInbox(inboxId) {
            try {
                const response = await fetch(`/inbox/api/inboxes/${inboxId}`);
                
                if (!response.ok) {
                    throw new Error('Failed to load inbox');
                }

                this.inbox = await response.json();
            } catch (error) {
                console.error('Error loading inbox:', error);
                this.error = error.message || 'Failed to load inbox details';
            } finally {
                this.loading = false;
            }
        },

        formatDate(dateString) {
            if (!dateString) return 'Never';
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
        },

        async pauseInbox() {
            try {
                const response = await fetch(`/inbox/api/inboxes/${this.inbox.id}/pause`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) throw new Error('Failed to pause inbox');

                this.inbox.status = 'paused';
                showToast('Inbox paused successfully', 'success');
            } catch (error) {
                console.error('Error pausing inbox:', error);
                showToast('Failed to pause inbox', 'error');
            }
        },

        async activateInbox() {
            try {
                const response = await fetch(`/inbox/api/inboxes/${this.inbox.id}/activate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) throw new Error('Failed to activate inbox');

                this.inbox.status = 'active';
                showToast('Inbox activated successfully', 'success');
            } catch (error) {
                console.error('Error activating inbox:', error);
                showToast('Failed to activate inbox', 'error');
            }
        },

        confirmDelete() {
            this.deleteModal.show = true;
        },

        async deleteInbox() {
            try {
                const response = await fetch(`/inbox/api/inboxes/${this.inbox.id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) throw new Error('Failed to delete inbox');

                showToast('Inbox deleted successfully', 'success');
                
                setTimeout(() => {
                    window.location.href = '/inbox/list';
                }, 1000);
            } catch (error) {
                console.error('Error deleting inbox:', error);
                showToast('Failed to delete inbox', 'error');
                this.deleteModal.show = false;
            }
        }
    };
}
</script>
{% endblock %}
