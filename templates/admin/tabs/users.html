<!-- Users Management Tab -->
<div class="glass-dark rounded-xl p-6">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-white">User Management</h2>
        <p class="text-white/60 mt-1">Manage platform users and permissions</p>
    </div>

    <!-- Users Table -->
    <div class="overflow-x-auto">
        <table class="w-full">
            <thead>
                <tr class="border-b border-white/10">
                    <th class="text-left py-3 px-4 text-sm font-semibold text-white/80">User</th>
                    <th class="text-left py-3 px-4 text-sm font-semibold text-white/80">Role</th>
                    <th class="text-left py-3 px-4 text-sm font-semibold text-white/80">Status</th>
                    <th class="text-left py-3 px-4 text-sm font-semibold text-white/80">Created</th>
                    <th class="text-left py-3 px-4 text-sm font-semibold text-white/80">Last Login</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="user in users" :key="user.id">
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                        <td class="py-4 px-4">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 bg-gradient-to-br from-primary-400 to-purple-500 rounded-full flex items-center justify-center text-white font-semibold" x-text="user.email[0].toUpperCase()"></div>
                                <div>
                                    <p class="text-white font-medium" x-text="user.full_name || user.email"></p>
                                    <p class="text-white/60 text-sm" x-text="user.email"></p>
                                </div>
                            </div>
                        </td>
                        <td class="py-4 px-4">
                            <span :class="user.role === 'admin' ? 'bg-purple-500/20 text-purple-300' : 'bg-blue-500/20 text-blue-300'" 
                                  class="px-3 py-1 rounded-full text-xs font-semibold uppercase" x-text="user.role"></span>
                        </td>
                        <td class="py-4 px-4">
                            <span :class="user.is_active ? 'bg-green-500/20 text-green-300' : 'bg-gray-500/20 text-gray-300'" 
                                  class="px-3 py-1 rounded-full text-xs font-semibold" x-text="user.is_active ? 'Active' : 'Inactive'"></span>
                        </td>
                        <td class="py-4 px-4 text-white/60 text-sm" x-text="new Date(user.created_at).toLocaleDateString()"></td>
                        <td class="py-4 px-4 text-white/60 text-sm" x-text="user.last_login_at ? new Date(user.last_login_at).toLocaleDateString() : 'Never'"></td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>
</div>
