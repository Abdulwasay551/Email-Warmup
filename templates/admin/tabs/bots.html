<!-- Bot Management Tab -->
<div class="glass-dark rounded-xl p-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-2xl font-bold text-white">Bot Email Management</h2>
            <p class="text-white/60 mt-1">Configure and manage email monitoring bots</p>
        </div>
        <button @click="showAddBotModal = true" class="px-4 py-2 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-lg hover:from-green-600 hover:to-emerald-700 transition-all shadow-lg hover:shadow-xl flex items-center space-x-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
            </svg>
            <span>Add Bot</span>
        </button>
    </div>

    <!-- Bots Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <template x-if="bots.length === 0">
            <div class="col-span-full text-center py-12">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white/10 rounded-full mb-4">
                    <svg class="w-8 h-8 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path>
                    </svg>
                </div>
                <h3 class="text-xl font-semibold text-white mb-2">No Bots Yet</h3>
                <p class="text-white/60 mb-6">Add your first bot to start monitoring emails</p>
                <button @click="showAddBotModal = true" class="px-6 py-3 bg-gradient-to-r from-primary-500 to-purple-600 text-white rounded-lg hover:from-primary-600 hover:to-purple-700 transition-all">
                    Add Your First Bot
                </button>
            </div>
        </template>

        <template x-for="bot in bots" :key="bot.id">
            <div class="glass-dark rounded-xl p-6 hover:scale-105 transition-transform duration-200">
                <!-- Status Badge -->
                <div class="flex items-center justify-between mb-4">
                    <span :class="bot.status === 'active' ? 'bg-green-500/20 text-green-300' : 'bg-gray-500/20 text-gray-300'" 
                          class="px-3 py-1 rounded-full text-xs font-semibold">
                        <span x-text="bot.status.toUpperCase()"></span>
                    </span>
                    <div class="flex items-center space-x-2">
                        <button @click="editBot(bot)" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
                            <svg class="w-4 h-4 text-white/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
                            </svg>
                        </button>
                        <button @click="deleteBot(bot.id)" class="p-2 hover:bg-red-500/20 rounded-lg transition-colors">
                            <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Bot Email -->
                <div class="mb-4">
                    <div class="flex items-center space-x-2 mb-2">
                        <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        <span class="text-white font-medium" x-text="bot.email_address"></span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="px-2 py-1 bg-purple-500/20 text-purple-300 rounded text-xs" x-text="bot.provider"></span>
                    </div>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <p class="text-xs text-white/40 mb-1">Processed</p>
                        <p class="text-lg font-bold text-white" x-text="bot.total_emails_processed || 0"></p>
                    </div>
                    <div>
                        <p class="text-xs text-white/40 mb-1">From Spam</p>
                        <p class="text-lg font-bold text-white" x-text="bot.spam_moved_to_inbox || 0"></p>
                    </div>
                </div>

                <!-- Health Status -->
                <div class="pt-4 border-t border-white/10">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-xs text-white/60">Health</span>
                        <span :class="bot.is_healthy ? 'text-green-400' : 'text-red-400'" class="text-xs font-semibold flex items-center space-x-1">
                            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                                <circle cx="10" cy="10" r="8"></circle>
                            </svg>
                            <span x-text="bot.is_healthy ? 'Healthy' : 'Issues'"></span>
                        </span>
                    </div>
                    
                    <!-- OAuth Status -->
                    <div class="flex items-center justify-between">
                        <span class="text-xs text-white/60">Gmail Connected</span>
                        <template x-if="bot.access_token">
                            <span class="text-xs font-semibold text-green-400 flex items-center space-x-1">
                                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                                </svg>
                                <span>Connected</span>
                            </span>
                        </template>
                        <template x-if="!bot.access_token">
                            <a :href="`/admin/bots/${bot.id}/oauth/connect`" class="text-xs font-semibold text-yellow-400 hover:text-yellow-300 flex items-center space-x-1 transition-colors">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                                </svg>
                                <span>Connect Gmail</span>
                            </a>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>
